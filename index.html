<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>石剪布 · 婚恋人格测试</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root {
  --bg: #0c0a09;
  --card: #1c1917;
  --card-hover: #292524;
  --accent: #d97706;
  --accent-glow: #f59e0b;
  --text: #fafaf9;
  --text-muted: #a8a29e;
  --border: #44403c;
  --stone: #94a3b8;
  --scissors: #f87171;
  --paper: #22d3ee;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* 背景光斑 */
.bg-orbs {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
}
.bg-orb {
  position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.12;
  animation: orbFloat 20s ease-in-out infinite;
}
.bg-orb:nth-child(1) { width:500px;height:500px;background:var(--accent);top:-10%;left:-10%;animation-delay:0s; }
.bg-orb:nth-child(2) { width:400px;height:400px;background:var(--scissors);bottom:-10%;right:-10%;animation-delay:-7s; }
.bg-orb:nth-child(3) { width:350px;height:350px;background:var(--paper);top:40%;left:50%;animation-delay:-14s; }

@keyframes orbFloat {
  0%,100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(40px,-30px) scale(1.1); }
  66% { transform: translate(-30px,40px) scale(0.9); }
}

/* 页面容器 */
.page { 
  position: relative; z-index: 1; 
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2rem 1rem;
  transition: opacity 0.5s, transform 0.5s;
}
.page.hidden { display: none; }
.page.fade-out { opacity: 0; transform: translateY(20px); }

/* 开始页 */
.start-title {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(3rem, 10vw, 6rem);
  font-weight: 900;
  letter-spacing: 0.3em;
  background: linear-gradient(135deg, var(--accent-glow), var(--scissors), var(--paper));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.3;
}

.icon-trio {
  display: flex; gap: 2rem; margin: 2.5rem 0;
}
.icon-trio .icon-item {
  width: 72px; height: 72px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; border: 2px solid var(--border);
  transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
}
.icon-trio .icon-item:hover {
  transform: translateY(-4px) scale(1.1);
}
.icon-trio .icon-item.stone { color: var(--stone); border-color: var(--stone); }
.icon-trio .icon-item.stone:hover { box-shadow: 0 0 24px rgba(148,163,184,0.3); }
.icon-trio .icon-item.scissors { color: var(--scissors); border-color: var(--scissors); }
.icon-trio .icon-item.scissors:hover { box-shadow: 0 0 24px rgba(248,113,113,0.3); }
.icon-trio .icon-item.paper { color: var(--paper); border-color: var(--paper); }
.icon-trio .icon-item.paper:hover { box-shadow: 0 0 24px rgba(34,211,238,0.3); }

.btn-start {
  margin-top: 1rem; padding: 1rem 3.5rem;
  background: linear-gradient(135deg, var(--accent), #b45309);
  color: #fff; font-size: 1.1rem; font-weight: 700;
  border: none; border-radius: 60px; cursor: pointer;
  transition: transform 0.25s, box-shadow 0.25s;
  letter-spacing: 0.15em;
}
.btn-start:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(217,119,6,0.4);
}

/* 答题页 */
.quiz-page { justify-content: flex-start; padding-top: 1.5rem; }

.progress-bar-wrap {
  width: 100%; max-width: 700px;
  height: 4px; background: var(--border); border-radius: 4px;
  margin-bottom: 1.5rem; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; width: 0%; border-radius: 4px;
  background: linear-gradient(90deg, var(--accent), var(--accent-glow));
  transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}

.quiz-counter {
  font-size: 0.85rem; color: var(--text-muted);
  margin-bottom: 1rem; letter-spacing: 0.1em;
}

.quiz-card {
  width: 100%; max-width: 700px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  transition: opacity 0.4s, transform 0.4s;
}
.quiz-card.slide-out {
  opacity: 0; transform: translateX(-60px);
}
.quiz-card.slide-in {
  opacity: 0; transform: translateX(60px);
}

.quiz-image {
  width: 100%; height: 200px;
  object-fit: cover;
  display: block;
  filter: brightness(0.7) saturate(0.8);
  transition: filter 0.4s;
}
.quiz-card:hover .quiz-image {
  filter: brightness(0.8) saturate(1);
}

.quiz-body { padding: 1.5rem; }

.quiz-scenario {
  font-size: 0.85rem; color: var(--accent);
  margin-bottom: 0.75rem; line-height: 1.6;
  font-style: italic;
}
.quiz-question {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.15rem; font-weight: 700;
  line-height: 1.8; margin-bottom: 1.5rem;
}

.options-list { display: flex; flex-direction: column; gap: 0.75rem; }

.option-btn {
  width: 100%; text-align: left;
  padding: 1rem 1.25rem;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 0.95rem;
  line-height: 1.6;
  cursor: pointer;
  transition: all 0.3s;
  position: relative; overflow: hidden;
}
.option-btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, var(--accent), transparent);
  opacity: 0; transition: opacity 0.4s;
}
.option-btn:hover {
  border-color: var(--accent);
  background: rgba(217,119,6,0.06);
  transform: translateX(4px);
}
.option-btn:active { transform: translateX(4px) scale(0.98); }
.option-btn.selected {
  border-color: var(--accent);
  background: rgba(217,119,6,0.12);
}
.option-btn.selected::before { opacity: 0.08; }

.option-label {
  display: inline-block; width: 24px; height: 24px;
  border: 1.5px solid var(--text-muted); border-radius: 6px;
  text-align: center; line-height: 24px; font-size: 0.75rem;
  margin-right: 0.75rem; flex-shrink: 0;
  transition: all 0.3s;
  color: var(--text-muted);
}
.option-btn.selected .option-label {
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
}

.option-text-wrap { display: flex; align-items: flex-start; }

/* 结果页 */
.result-page { padding: 2rem 1rem; }

.result-type-badge {
  display: inline-flex; align-items: center; gap: 0.75rem;
  padding: 0.75rem 2rem; border-radius: 60px;
  font-family: 'Noto Serif SC', serif;
  font-size: 1.5rem; font-weight: 900;
  letter-spacing: 0.2em;
  margin-bottom: 1.5rem;
  border: 2px solid;
}
.result-type-badge.stone { color: var(--stone); border-color: var(--stone); background: rgba(148,163,184,0.08); }
.result-type-badge.scissors { color: var(--scissors); border-color: var(--scissors); background: rgba(248,113,113,0.08); }
.result-type-badge.paper { color: var(--paper); border-color: var(--paper); background: rgba(34,211,238,0.08); }
.result-type-badge.mix { color: var(--accent); border-color: var(--accent); background: rgba(217,119,6,0.08); }

.result-subtitle {
  font-size: 1rem; color: var(--text-muted);
  margin-bottom: 2.5rem; text-align: center; max-width: 500px;
  line-height: 1.8;
}

.score-bars { width: 100%; max-width: 500px; margin-bottom: 2.5rem; }
.score-bar-item { margin-bottom: 1rem; }
.score-bar-label {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 0.85rem; margin-bottom: 0.4rem;
}
.score-bar-track {
  height: 8px; background: var(--border); border-radius: 8px; overflow: hidden;
}
.score-bar-value {
  height: 100%; border-radius: 8px; width: 0%;
  transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
}
.score-bar-value.stone { background: linear-gradient(90deg, var(--stone), #cbd5e1); }
.score-bar-value.scissors { background: linear-gradient(90deg, var(--scissors), #fca5a5); }
.score-bar-value.paper { background: linear-gradient(90deg, var(--paper), #67e8f9); }

.result-section {
  width: 100%; max-width: 600px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 1.5rem; margin-bottom: 1.25rem;
}
.result-section h3 {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.05rem; font-weight: 700;
  margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem;
}
.result-section p, .result-section li {
  font-size: 0.9rem; color: var(--text-muted); line-height: 1.9;
}
.result-section ul { padding-left: 1.2rem; }
.result-section li { margin-bottom: 0.3rem; }

.match-tag {
  display: inline-block; padding: 0.3rem 0.9rem;
  border-radius: 20px; font-size: 0.8rem; font-weight: 700;
  margin: 0.25rem 0.25rem 0.25rem 0;
}
.match-tag.good { background: rgba(34,197,94,0.12); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
.match-tag.bad { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
.match-tag.warn { background: rgba(234,179,8,0.1); color: #facc15; border: 1px solid rgba(234,179,8,0.25); }

.btn-restart {
  margin-top: 1rem; padding: 0.85rem 2.5rem;
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--text-muted); font-size: 0.95rem;
  border-radius: 60px; cursor: pointer;
  transition: all 0.3s;
}
.btn-restart:hover {
  border-color: var(--accent); color: var(--accent);
  transform: translateY(-2px);
}

/* 滚动条 */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* 响应式 */
@media (max-width: 640px) {
  .start-title { letter-spacing: 0.15em; }
  .icon-trio { gap: 1.2rem; }
  .icon-trio .icon-item { width: 56px; height: 56px; font-size: 1.2rem; }
  .quiz-image { height: 150px; }
  .quiz-body { padding: 1.2rem; }
  .quiz-question { font-size: 1.05rem; }
  .option-btn { padding: 0.85rem 1rem; font-size: 0.9rem; }
  .result-type-badge { font-size: 1.2rem; padding: 0.6rem 1.5rem; }
}

/* 减少动画偏好 */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* toast提示 */
.toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--card); border: 1px solid var(--border);
  padding: 0.75rem 1.5rem; border-radius: 12px;
  font-size: 0.9rem; color: var(--text);
  opacity: 0; transition: all 0.4s; z-index: 100;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- 背景光斑 -->
<div class="bg-orbs" aria-hidden="true">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>

<!-- 开始页 -->
<section id="startPage" class="page" role="main">
  <div class="text-center">
    <div class="icon-trio justify-center flex">
      <div class="icon-item stone" title="石头"><i class="fas fa-mountain"></i></div>
      <div class="icon-item scissors" title="剪刀"><i class="fas fa-scissors"></i></div>
      <div class="icon-item paper" title="布"><i class="fas fa-scroll"></i></div>
    </div>
    <h1 class="start-title">石剪布</h1>
    <p style="color:var(--text-muted); margin-top:0.75rem; font-size:1.05rem; letter-spacing:0.15em;">
      你的婚恋人格，是什么形状？
    </p>
    <p style="color:var(--text-muted); margin-top:1.5rem; font-size:0.85rem; max-width:420px; line-height:1.9; opacity:0.7;">
      这不是普通的性格测试。我们为你准备了30个充满戏剧张力的情感场景——在这些至暗与高光时刻里，你的本能反应将出卖你真正的婚恋人格。准备好了吗？
    </p>
    <button class="btn-start" onclick="startQuiz()" aria-label="开始测试">
      开始测试
    </button>
    <p style="color:var(--text-muted); margin-top:1rem; font-size:0.75rem; opacity:0.5;">
      共 30 题 · 约 5-8 分钟 · 结果仅供参考
    </p>
  </div>
</section>

<!-- 答题页 -->
<section id="quizPage" class="page quiz-page hidden" role="main" aria-live="polite">
  <div class="progress-bar-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>
  <div class="quiz-counter" id="quizCounter"></div>
  <div class="quiz-card" id="quizCard">
    <img class="quiz-image" id="quizImage" alt="场景插图" loading="eager">
    <div class="quiz-body">
      <p class="quiz-scenario" id="quizScenario"></p>
      <p class="quiz-question" id="quizQuestion"></p>
      <div class="options-list" id="optionsList"></div>
    </div>
  </div>
</section>

<!-- 结果页 -->
<section id="resultPage" class="page result-page hidden" role="main">
  <div class="text-center flex flex-col items-center" id="resultContent">
    <!-- 动态填充 -->
  </div>
</section>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ==================== 题目数据 ====================
// 格式：[场景, 问题, [[选项文字, 石头分, 剪刀分, 布分], ...], 图片seed]
const questions = [
  [
    "你和另一半正在举行婚礼，交换戒指的那一刻，你余光瞥到角落里坐着伴侣的前任，对方正用一种意味深长的微笑看着你们。",
    "你的第一反应是——",
    [

      ["礼成后故意走过去，优雅地递上一杯酒：'谢谢来见证我们的幸福'", 0, 2, 0],
      ["心里有一丝不舒服，但告诉自己今天最重要的人就在身边", 0, 0, 2],

    ],

  ],

    "你会怎么做？",
    [
      ["'你去接吧，我在旁边等你。'然后继续看电影，不干涉", 2, 0, 0],
      ["'嗯，你接吧。'但语气和眼神都带着一丝不易察觉的冷意", 0, 2, 0],
      ["主动说'你开免提吧，我帮你一起安慰ta'", 0, 0, 2],
      ["'这么晚了打电话来哭，你觉得合适吗？'直接表达不满", 1, 1, 0]
    ],
    "nightphone7"
  ],
  [
    "伴侣出差外地，发来一张和同事的聚餐合照。但照片里有个异性靠得特别近，发丝都快贴在一起了。伴侣配文：'团建好开心~'",
    "你的反应是？",
    [
      ["直接回复一个问号，等对方自己解释，不主动加戏", 2, 0, 0],
      ["点赞，然后评论'同事关系真好啊~'加一个微笑表情", 0, 2, 0],
      ["什么都不说，但那天晚上翻来覆去睡不着，反复放大那张照片", 0, 0, 2],

  [

    [
      ["继续做自己的事，不主动联系，等对方冷静了自然会回来", 2, 0, 0],
      ["发一条朋友圈'有些人失踪技能点满了'，设置仅对方可见", 0, 2, 0],

      ["发一条简短的消息'注意安全，回来再说'，然后放下手机", 1, 0, 1]
    ],
    "door55"
  ],
  [
    "你期待了很久的生日终于到了。伴侣神秘兮兮地递上礼物盒，你满怀期待地打开——里面是一个完全不是你风格的巨大毛绒熊。你喜欢文艺极简，这个熊占满了半个沙发。",
    "打开那一刻——",
    [
      ["笑着说谢谢，然后真诚地问'你为什么选这个呀？我想听听你的想法'", 2, 0, 0],
      ["表情微变了一瞬，但很快笑着说出一句恰到好处的玩笑化解尴尬", 0, 2, 0],
      ["开心地抱住毛绒熊说'好可爱！'，回家关上门后再悄悄失落", 0, 0, 2],
      ["直接说'这个不太适合我，下次咱们一起挑吧'", 1, 1, 0]
    ],
    "gift99"
  ],
  [
    "你最好的朋友拉你到一边，表情严肃地说：'我觉得你对象不太对劲，上次我看到ta在商场和一个异性举止很亲密……'描述了一个让你心里咯噔一下的场景。",
    "你的反应是？",
    [
      ["'你说具体点，有时间地点吗？我需要的是事实，不是感觉'", 2, 0, 0],

    "whisper33"
  ],
  [
    "你单身时的前任突然通过某平台找到了你的新微信号，发来一句：'好久不见，最近还好吗？'而你现在有对象。",
    "你会怎么处理？",
    [
      ["不回复，直接删除，不需要多余的动作", 2, 0, 0],
      ["回复'挺好的，你呢？'然后自然地聊几句，你觉得自己问心无愧", 0, 2, 0],

    ],
    "message21"
  ],
  [
    "伴侣的异性好朋友遇到急事想借一笔不小的钱。伴侣来跟你商量——但你清楚地知道，那个异性曾经对伴侣表过白。",

    [
      ["'不行，钱可以借别人，这个人不行。'没有商量的余地", 2, 0, 0],

      ["'可以借，但你要当面写借条，全程我在场。'", 1, 1, 0]
    ],
    "money77"
  ],
  [
    "伴侣带你去见家长。饭桌上，伴侣的妈妈突然笑着说：'你学历是本科吧？我家孩子之前谈的那个可是硕士呢。'满桌人安静了一秒。",
    "而你注意到伴侣——没有说话。",

    desc: "你的婚恋人格是「布」。你是感情里最温暖、最柔软、最善解人意的存在。你天生具有极强的共情能力，能敏锐感知到对方的情绪变化，并且总是第一时间给予回应和安慰。你的爱是包裹式的——像一个温暖的拥抱，让人觉得被接纳、被理解、被呵护。但问题在于，你的柔软也让你容易失去边界、过度付出、在关系中逐渐模糊自己的形状。",
    traits: ["极强的共情能力和情感直觉", "温柔体贴，照顾人的能力满分", "善解人意，很少站在对立面", "愿意为感情付出和妥协", "能让对方感受到被深度理解和接纳"],
    weaknesses: ["缺乏边界感，容易被得寸进尺", "过度付出，忽略自己的需求", "容易患得患失，安全感不足", "不擅长拒绝，常常委屈自己成全对方", "容易被'有故事'的人吸引，然后被消耗"],
    loveStyle: "你的爱是'你需要什么我都给'——你总是优先考虑对方的感受，甚至到了忘记自己也需要被爱的地步。你的柔软是真正的力量，但前提是你学会在柔软之外长出骨头。",
    matchGood: [{ name: "石头", reason: "石头给你方向感和绝对的安全感，你给石头温度和柔软——这是最互补的组合" }],
    matchBad: [{ name: "剪刀（高危警告）", reason: "剪刀会无意识地'剪碎'你，利用你的善良和包容，而你往往意识不到自己在被消耗" }],
    matchWarn: [{ name: "布", reason: "两个布在一起很温暖，但可能缺乏'主心骨'，关键时刻谁来做决定？" }],
    advice: "你最大的课题是学会'说不'。你的善良必须带有锋芒。在一段关系里，如果你总是那个退让的人，那这段关系的天平迟早会彻底失衡。记住：你的价值不是由你付出了多少来定义的。"
  }
};

// ==================== 状态管理 ====================
let currentQ = 0;
let scores = { stone: 0, scissors: 0, paper: 0 };
let isTransitioning = false;

// ==================== 页面切换 ====================
function showPage(pageId) {
  const pages = document.querySelectorAll('.page');
  pages.forEach(p => {
    if (!p.classList.contains('hidden')) {
      p.classList.add('fade-out');
      setTimeout(() => {
        p.classList.add('hidden');
        p.classList.remove('fade-out');
      }, 400);
    }
  });
  setTimeout(() => {
    const target = document.getElementById(pageId);
    target.classList.remove('hidden');
    target.classList.add('fade-out');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        target.classList.remove('fade-out');
      });
    });
  }, 450);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ==================== 开始测试 ====================
function startQuiz() {
  currentQ = 0;
  scores = { stone: 0, scissors: 0, paper: 0 };
  showPage('quizPage');
  setTimeout(() => renderQuestion(), 500);
}

// ==================== 渲染题目 ====================
function renderQuestion() {
  const q = questions[currentQ];
  const card = document.getElementById('quizCard');
  const img = document.getElementById('quizImage');
  const scenario = document.getElementById('quizScenario');
  const question = document.getElementById('quizQuestion');
  const optionsList = document.getElementById('optionsList');
  const counter = document.getElementById('quizCounter');
  const progress = document.getElementById('progressFill');

  // 更新进度
  const pct = ((currentQ) / questions.length) * 100;
  progress.style.width = pct + '%';
  counter.textContent = `${currentQ + 1} / ${questions.length}`;

  // 更新图片
  img.src = `https://picsum.photos/seed/${q[3]}/700/400`;

  // 更新文字
  scenario.textContent = q[0];
  question.textContent = q[1];

  // 更新选项
  const labels = ['A', 'B', 'C', 'D'];
  optionsList.innerHTML = q[2].map((opt, i) => `
    <button class="option-btn" onclick="selectOption(${i})" aria-label="选项${labels[i]}">
      <span class="option-text-wrap">
        <span class="option-label">${labels[i]}</span>
        <span>${opt[0]}</span>
      </span>
    </button>
  `).join('');

  // 入场动画
  card.classList.remove('slide-out');
  card.classList.add('slide-in');
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      card.classList.remove('slide-in');
    });
  });

  isTransitioning = false;
}

// ==================== 选择选项 ====================
function selectOption(index) {
  if (isTransitioning) return;
  isTransitioning = true;

  const q = questions[currentQ];
  const opt = q[2][index];

  // 计分
  scores.stone += opt[1];
  scores.scissors += opt[2];
  scores.paper += opt[3];

  // 选中效果
  const btns = document.querySelectorAll('.option-btn');
  btns[index].classList.add('selected');

  // 延迟后切换下一题
  setTimeout(() => {
    const card = document.getElementById('quizCard');
    card.classList.add('slide-out');

    setTimeout(() => {
      currentQ++;
      if (currentQ < questions.length) {
        renderQuestion();
      } else {
        // 更新进度到100%
        document.getElementById('progressFill').style.width = '100%';
        setTimeout(() => showResult(), 300);
      }
    }, 400);
  }, 500);
}

// ==================== 显示结果 ====================
function showResult() {
  showPage('resultPage');
  setTimeout(() => renderResult(), 550);
}

function renderResult() {
  const total = scores.stone + scores.scissors + scores.paper;
  const pctStone = Math.round((scores.stone / total) * 100);
  const pctScissors = Math.round((scores.scissors / total) * 100);
  const pctPaper = Math.round((scores.paper / total) * 100);

  // 判断主类型
  const sorted = [
    { key: 'stone', score: scores.stone, pct: pctStone },
    { key: 'scissors', score: scores.scissors, pct: pctScissors },
    { key: 'paper', score: scores.paper, pct: pctPaper }
  ].sort((a, b) => b.score - a.score);

  const primary = sorted[0];
  const secondary = sorted[1];
  const isMix = (primary.score - secondary.score) <= 8; // 分差小于等于8视为混合型

  const container = document.getElementById('resultContent');

  let typeBadge, typeName, typeIcon, badgeClass;

  if (isMix) {
    const mixNames = { stone: '石', scissors: '剪', paper: '布' };
    typeName = mixNames[primary.key] + mixNames[secondary.key] + '混合型';
    typeIcon = 'fa-shuffle';
    badgeClass = 'mix';
  } else {
    const rd = resultData[primary.key];
    typeName = rd.name;
    typeIcon = rd.icon;
    badgeClass = rd.badgeClass;
  }

  // 构建结果HTML
  let html = `
    <div class="result-type-badge ${badgeClass}">
      <i class="fas ${typeIcon}"></i>
      <span>${typeName}</span>
    </div>
    <p class="result-subtitle">${isMix ? '你的人格在两种类型之间游走，拥有更丰富的情感面向' : resultData[primary.key].subtitle}</p>
  `;

  // 分数条
  html += `
    <div class="score-bars">
      <div class="score-bar-item">
        <div class="score-bar-label">
          <span style="color:var(--stone)"><i class="fas fa-mountain" style="margin-right:6px"></i>石头</span>
          <span>${pctStone}%</span>
        </div>
        <div class="score-bar-track">
          <div class="score-bar-value stone" id="barStone"></div>
        </div>
      </div>
      <div class="score-bar-item">
        <div class="score-bar-label">
          <span style="color:var(--scissors)"><i class="fas fa-scissors" style="margin-right:6px"></i>剪刀</span>
          <span>${pctScissors}%</span>
        </div>
        <div class="score-bar-track">
          <div class="score-bar-value scissors" id="barScissors"></div>
        </div>
      </div>
      <div class="score-bar-item">
        <div class="score-bar-label">
          <span style="color:var(--paper)"><i class="fas fa-scroll" style="margin-right:6px"></i>布</span>
          <span>${pctPaper}%</span>
        </div>
        <div class="score-bar-track">
          <div class="score-bar-value paper" id="barPaper"></div>
        </div>
      </div>
    </div>
  `;

  if (isMix) {
    // 混合型解析
    const rd1 = resultData[primary.key];
    const rd2 = resultData[secondary.key];
    const mixNames = { stone: '石头', scissors: '剪刀', paper: '布' };

    html += `
      <div class="result-section">
        <h3><i class="fas fa-fingerprint" style="color:var(--accent)"></i> 你的双重人格画像</h3>
        <p>你的测试结果显示出明显的${mixNames[primary.key]}和${mixNames[secondary.key]}特质。这意味着你在感情中拥有两种截然不同的面向——</p>
        <p style="margin-top:0.75rem"><strong style="color:var(--${primary.key === 'stone' ? 'stone' : primary.key === 'scissors' ? 'scissors' : 'paper'})">${mixNames[primary.key]}面（${primary.pct}%）：</strong>${rd1.desc.substring(0, 80)}……</p>
        <p style="margin-top:0.5rem"><strong style="color:var(--${secondary.key === 'stone' ? 'stone' : secondary.key === 'scissors' ? 'scissors' : 'paper'})">${mixNames[secondary.key]}面（${secondary.pct}%）：</strong>${rd2.desc.substring(0, 80)}……</p>
        <p style="margin-top:0.75rem">这种混合让你在亲密关系中更加立体，但也意味着你有时候会在两种模式之间摇摆不定——有时候果断直接，有时候又会柔软退让，连你自己都搞不清哪个才是'真正的自己'。</p>
      </div>
      <div class="result-section">
        <h3><i class="fas fa-yin-yang" style="color:var(--accent)"></i> 你的核心矛盾</h3>
        <p>混合型人格最大的挑战在于'一致性'。你的伴侣可能会觉得你'像变了一个人'——上一秒还在讲道理，下一秒就开始共情；有时候坚定得像石头，有时候又柔软得像布。这不是缺点，但你需要让伴侣理解：这两个面都是真实的你。</p>
      </div>
      <div class="result-section">
        <h3><i class="fas fa-heart" style="color:var(--scissors)"></i> 匹配建议</h3>
        <p style="margin-bottom:0.75rem">你的混合特质让你比单一类型有更广的适配范围，但也要特别注意：</p>
        <div>
          <span class="match-tag good">最佳：${rd1.matchGood[0].name}</span>
          <span class="match-tag warn">谨慎：${mixNames[secondary.key]}型</span>
          <span class="match-tag bad">警惕：${rd1.matchBad[0].name}</span>
        </div>
        <p style="margin-top:0.75rem">${rd1.matchGood[0].reason}</p>
      </div>
      <div class="result-section">
        <h3><i class="fas fa-compass" style="color:var(--accent)"></i> 给你的建议</h3>
        <p>接纳自己的两面性，不要试图只保留'好'的那一面。你需要找到一个能看到你全部面貌、并且都接受的伴侣。同时，在关系初期就坦诚自己的这种'双模'特质，避免对方因为预期落差而产生不信任。</p>
      </div>
    `;
  } else {
    // 单一类型解析
    const rd = resultData[primary.key];

    html += `
      <div class="result-section">
        <h3><i class="fas fa-fingerprint" style="color:var(--accent)"></i> 你的人格画像</h3>
        <p>${rd.desc}</p>
      </div>
      <div class="result-section">
        <h3><i class="fas fa-star" style="color:var(--accent-glow)"></i> 你的核心优势</h3>
        <ul>${rd.traits.map(t => `<li>${t}</li>`).join('')}</ul>
      </div>
      <div class="result-section">
        <h3><i class="fas fa-triangle-exclamation" style="color:var(--scissors)"></i> 你的潜在盲区</h3>
        <ul>${rd.weaknesses.map(w => `<li>${w}</li>`).join('')}</ul>
      </div>
      <div class="result-section">
        <h3><i class="fas fa-heart-pulse" style="color:var(--scissors)"></i> 你的恋爱模式</h3>
        <p>${rd.loveStyle}</p>
      </div>
      <div class="result-section">
        <h3><i class="fas fa-puzzle-piece" style="color:var(--paper)"></i> 匹配分析</h3>
        <div style="margin-bottom:0.75rem">
          ${rd.matchGood.map(m => `<span class="match-tag good">最佳匹配：${m.name}</span>`).join('')}
          ${rd.matchBad.map(m => `<span class="match-tag bad">危险匹配：${m.name}</span>`).join('')}
          ${rd.matchWarn.map(m => `<span class="match-tag warn">需要注意：${m.name}</span>`).join('')}
        </div>
        <p style="margin-bottom:0.5rem"><strong style="color:#4ade80">为什么${rd.matchGood[0].name}最适合你：</strong>${rd.matchGood[0].reason}</p>
        <p style="margin-bottom:0.5rem"><strong style="color:#f87171">为什么${rd.matchBad[0].name}很危险：</strong>${rd.matchBad[0].reason}</p>
        <p><strong style="color:#facc15">关于${rd.matchWarn[0].name}：</strong>${rd.matchWarn[0].reason}</p>
      </div>
      <div class="result-section">
        <h3><i class="fas fa-compass" style="color:var(--accent)"></i> 成长建议</h3>
        <p>${rd.advice}</p>
      </div>
    `;
  }

  html += `
    <button class="btn-restart" onclick="restartQuiz()">
      <i class="fas fa-rotate-right" style="margin-right:8px"></i>重新测试
    </button>
    <p style="color:var(--text-muted); margin-top:1rem; font-size:0.75rem; opacity:0.5; text-align:center;">
      本测试仅供娱乐参考，不构成任何专业心理建议
    </p>
  `;

  container.innerHTML = html;

  // 延迟启动分数条动画
  setTimeout(() => {
    const barStone = document.getElementById('barStone');
    const barScissors = document.getElementById('barScissors');
    const barPaper = document.getElementById('barPaper');
    if (barStone) barStone.style.width = pctStone + '%';
    if (barScissors) barScissors.style.width = pctScissors + '%';
    if (barPaper) barPaper.style.width = pctPaper + '%';
  }, 100);

  // 滚动到顶部
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ==================== 重新测试 ====================
function restartQuiz() {
  showPage('startPage');
}

// ==================== 键盘支持 ====================
document.addEventListener('keydown', (e) => {
  if (document.getElementById('quizPage').classList.contains('hidden')) return;
  if (isTransitioning) return;

  const keyMap = { 'a': 0, 'b': 1, 'c': 2, 'd': 3, '1': 0, '2': 1, '3': 2, '4': 3 };
  const idx = keyMap[e.key.toLowerCase()];
  if (idx !== undefined) {
    selectOption(idx);
  }
});
</script>
</body>
</html>
